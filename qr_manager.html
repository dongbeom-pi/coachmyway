<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코치마이웨이 데스크 출퇴근 QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="text-center p-5 bg-secondary rounded shadow-lg" style="max-width: 500px; width: 100%;">
        <h2 class="fw-bold mb-2">코치마이웨이</h2>
        <p class="text-light small mb-4">출근/퇴근 시 카메라로 아래 QR코드를 스캔하세요.</p>
        
        <div id="qrcode" class="bg-white p-4 d-inline-block rounded mb-4"></div>
        
        <div class="fs-5 fw-bold text-warning" id="timer">남은 시간: 60초</div>
        <div class="text-light small mt-2" id="current-time"></div>
    </div>

    <script>
        // 1분 폭파 다이내믹 QR 주소 생성 규칙
        // 강사들이 스캔하면 로그인 화면(index.html)으로 자동 이동하게 설계
        function generateDynamicQR() {
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; // 기존 QR코드 삭제

            const now = new Date();
            const timestamp = now.getTime(); // 1분 폭파용 고유 번호 추출
            
            // 실전 배포 시 'index.html'이 서버에 올라간 실제 웹 주소(URL)로 교체해야 함
            // 지금은 내 컴퓨터 로파일 경로로 예시 세팅
            const targetUrl = `https://coachmyway-fe9bb.firebaseapp.com/index.html?token=${timestamp}`;

            // QR코드 그리기
            new QRCode(qrContainer, {
                text: targetUrl,
                width: 256,
                height: 256,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // 60초 타이머 무한 루프 구동
        let timeLeft = 60;
        setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = `남은 시간: ${timeLeft}초`;
            
            const now = new Date();
            document.getElementById("current-time").innerText = `현재 시간: ${now.toLocaleTimeString()}`;

            if (timeLeft <= 0) {
                generateDynamicQR(); // 1분 지나면 QR코드 폭파 후 새로 갱신
                timeLeft = 60;
            }
        }, 1000);

        // 최초 실행
        generateDynamicQR();
    </script>
</body>
</html>
