<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코치마이웨이 통합 행정 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f4f6f9; color: #333; }
        .card { border: 1px solid #d1d3e2; border-radius: 0.35rem; background-color: #ffffff; }
        .table th { background-color: #f8f9fc; color: #4e73df; font-weight: bold; border-bottom: 2px solid #e3e6f0; }
        @media (max-width: 768px) { .container { max-width: 100%; padding: 12px; } .mobile-full { width: 100% !important; } .btn-lg { padding: 15px; font-size: 1.1rem; } }
        @media (min-width: 769px) { .pc-layout { max-width: 1280px; margin: 0 auto; } }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAM3NMehubFHjGSGd2D_1IB6FxFhvuL3rE",
            authDomain: "coachmyway-fe9bb.firebaseapp.com",
            databaseURL: "https://coachmyway-fe9bb-default-rtdb.firebaseio.com",
            projectId: "coachmyway-fe9bb",
            storageBucket: "coachmyway-fe9bb.firebasestorage.app",
            messagingSenderId: "51608733810",
            appId: "1:51608733810:web:0643b8d4ffa9477d9cdaeb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let currentUserData = null;

        // [교정] 팝업 창 인라인 강제 구동 및 도르마무 차단
        window.login = function() {
            signInWithPopup(auth, provider).then((res) => {
                if (res.user) { checkRole(res.user); }
            }).catch(err => {
                console.error("인증 실패:", err);
                alert("구글 로그인이 중단되었습니다.");
            });
        };

        window.logout = function() {
            signOut(auth).then(() => { showView('loginView'); });
        };

        async function checkRole(user) {
            currentUser = user;
            try {
                const userDoc = await getDoc(doc(db, "Users", user.uid));
                if (!userDoc.exists()) {
                    document.getElementById("regUid").value = user.uid;
                    document.getElementById("regEmail").value = user.email;
                    showView('registerView'); // 가입 안 된 신규 유저는 무조건 여기 홀딩
                } else {
                    currentUserData = userDoc.data();
                    if (currentUserData.role === "admin") { loadAdminDashboard(); showView('adminView'); }
                    else if (currentUserData.role === "instructor") { showView('instructorView'); }
                    else if (currentUserData.role === "assistant") { showView('assistantView'); }
                }
            } catch (e) {
                console.error("DB 조회 에러:", e);
            }
        }

        window.submitRegister = async function(e) {
            e.preventDefault();
            const uid = document.getElementById("regUid").value;
            const email = document.getElementById("regEmail").value;
            const realName = document.getElementById("regName").value;
            const role = document.getElementById("regRole").value;
            const jobType = document.getElementById("regJobType").value;

            if (!realName.trim()) { return alert("본명을 입력하세요."); }

            await setDoc(doc(db, "Users", uid), {
                uid: uid, email: email, realName: realName, role: role,
                jobType: (role === "instructor") ? jobType : "none", agreedToTerms: true
            });

            alert("등록 완료! 마스터 권한 확인을 위해 다시 로그인해 주세요.");
            logout();
        };

        window.toggleJobType = function(val) {
            document.getElementById("jobTypeDiv").style.display = (val === "instructor") ? "block" : "none";
        };

        async function loadAdminDashboard() {
            const q = query(collection(db, "Attendance"));
            const querySnapshot = await getDocs(q);
            const tbody = document.getElementById("adminTableBody");
            tbody.innerHTML = "";
            querySnapshot.forEach((res) => {
                const data = res.data();
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${data.date}</td>
                    <td class="fw-bold">${data.realName}</td>
                    <td>${data.checkInTime || '-'}</td>
                    <td>${data.checkOutTime || '-'}</td>
                    <td><select class="form-select form-select-sm" onchange="updatePrepTime('${res.id}', this.value)"><option value="0:15" ${data.prepTime==='0:15'?'selected':''}>0:15</option></select></td>
                    <td><input type="checkbox" ${data.kakaoReportChecked ? 'checked' : ''}></td>
                    <td><input type="checkbox" ${data.managerConfirmed ? 'checked' : ''}></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showView(viewId) {
            ['loginView', 'registerView', 'adminView', 'instructorView', 'assistantView'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.style.display = (id === viewId) ? 'block' : 'none';
            });
        }

        // 초기 세션 안정화 상태 유지
        onAuthStateChanged(auth, (user) => {
            if (user) { checkRole(user); } 
            else { showView('loginView'); }
        });
    </script>
</head>
<body class="bg-light">
    <div class="container py-4 pc-layout">
        <div id="loginView" class="card shadow-sm p-4 mx-auto text-center" style="max-width: 420px; display: none; margin-top: 12%;">
            <h5 class="mb-2 fw-bold">코치마이웨이 통합 행정 시스템</h5>
            <p class="text-muted small mb-4">정산 데이터 보호를 위해 소셜 인증을 진행해 주세요.</p>
            <button onclick="login()" class="btn btn-dark w-100 py-2.5 small fw-bold">Google 계정 로그인</button>
        </div>
        <div id="registerView" class="card shadow-sm p-4 mx-auto" style="max-width: 480px; display: none;">
            <h6 class="fw-bold mb-3 border-bottom pb-2 text-primary">사용자 신규 등록 및 급여 지침 동의</h6>
            <form onsubmit="submitRegister(event)">
                <input type="hidden" id="regUid"><input type="hidden" id="regEmail">
                <div class="mb-3">
                    <label class="form-label small fw-bold">성함 (급여 정산용 실명)</label>
                    <input type="text" id="regName" class="form-control form-control-sm" required placeholder="예: 김동범">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">직무 권한 구분</label>
                    <select id="regRole" class="form-select form-select-sm" onchange="toggleJobType(this.value)">
                        <option value="instructor">강사 (프리랜서)</option>
                        <option value="assistant">조교</option>
                        <option value="admin">관리자 (운영실장)</option>
                    </select>
                </div>
                <div class="mb-3" id="jobTypeDiv">
                    <label class="form-label small fw-bold">강사 담당 세부 파트</label>
                    <select id="regJobType" class="form-select form-select-sm">
                        <option value="checker">체커 (준비 시간 15분 전 출근)</option>
                        <option value="actor">액터 (준비 시간 10분 전 출근)</option>
                        <option value="pt">PT (준비 시간 10분 전 출근)</option>
                    </select>
                </div>
                <div class="mb-3 bg-light p-3 border rounded small text-secondary">
                    <div class="fw-bold text-dark mb-1">근무 기록 및 정산 세칙 필독 지침</div>
                    <div>1. 당월 정산된 급여는 익월 10일에 일괄 지급됩니다.</div>
                    <div>2. 월말 마감 이후 데이터 수정 및 소급 적용이 절대 불가능합니다.</div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="regAgree" required>
                    <label class="form-check-label small text-muted" for="regAgree">위 정산 세칙 조항을 숙지했으며 이에 동의합니다.</label>
                </div>
                <button type="submit" class="btn btn-primary btn-sm w-100 py-2">등록 및 서약 완료</button>
            </form>
        </div>
        <div id="adminView" class="card shadow-sm p-4" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                <h5 class="fw-bold m-0">운영실장 총괄 대시보드</h5>
                <button onclick="logout()" class="btn btn-outline-secondary btn-sm px-3">시스템 로그아웃</button>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered align-middle small text-center m-0">
                    <thead>
                        <tr>
                            <th>근무 일자</th><th>담당자 성함</th><th>실제 출근시간</th><th>실제 퇴근시간</th><th>준비 시간</th><th>카톡 보고</th><th>최종 승인</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
        <div id="instructorView" class="card shadow-sm p-4 mx-auto text-center" style="max-width: 440px; display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2"><h6>강사 포털</h6><button onclick="logout()" class="btn btn-light btn-sm">로그아웃</button></div>
            <div class="d-grid gap-3 mb-4"><button class="btn btn-success btn-lg py-3 fw-bold">데스크 QR 출근 등록</button></div>
        </div>
        <div id="assistantView" class="card shadow-sm p-4 mx-auto text-center" style="max-width: 440px; display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2"><h6>조교 포털</h6><button onclick="logout()" class="btn btn-light btn-sm">로그아웃</button></div>
        </div>
    </div>
</body>
</html>
